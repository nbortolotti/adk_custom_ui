<div class="chat-container">
  <h2>ADK Custom Chat UI (Angular)</h2>

  <div class="messages">
    <!-- Angular v17+ control flow -->
    @for (msg of messages(); track $index) {
    <div [class]="'message ' + msg.role">
      <strong>{{ msg.role === 'user' ? 'Tú' : 'Asistente' }}</strong>
      <p>{{ msg.content }}</p>
    </div>
    }

    @if (loading()) {
    <div class="message assistant loading">
      <p>Pensando...</p>
    </div>
    }
  </div>

  <div class="input-area">
    <input [(ngModel)]="prompt" (keyup.enter)="sendMessage()" placeholder="Escribe tu mensaje aquí..."
      [disabled]="loading()" />
    <button (click)="sendMessage()" [disabled]="loading()">Enviar</button>
  </div>
</div>
